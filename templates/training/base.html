<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Training Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-4">
      <!-- HEADER -->
      <h1 class="text-center mb-4">Employee Training Analytics Portal</h1>

      <!-- NAV -->
      <nav class="text-center mb-4">
        <a
          href="{% url 'training:home' %}"
          class="btn btn-outline-primary btn-sm"
          >Home</a
        >
        <a href="#" class="btn btn-outline-primary btn-sm">Employees</a>
        <a 
          href="{% url 'training:courses_list' %}"
          class="btn btn-outline-primary btn-sm"
          >Courses</a>
        <a href="#" class="btn btn-outline-primary btn-sm">Sessions</a>
        <a
          href="{% url 'training:enrollment_list' %}"
          class="btn btn-outline-primary btn-sm"
          >Enrollments</a
        >
        <a href="#" class="btn btn-outline-primary btn-sm">Analytics</a>
      </nav>

      {% block content %}{% endblock %}
    </div>
  </body>
</html>
